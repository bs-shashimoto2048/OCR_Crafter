app:
  name: ocr-crafter
  db_path: outputs/app.db

cors:
  # フロントエンド開発サーバーのオリジン。Viteのポートを変更した場合はここへ追加する。
  # 環境変数 CORS_ALLOWED_ORIGINS（カンマ区切り）でも上書き可能
  allowed_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173

paths:
  data_projects: data/projects
  outputs: outputs

preprocess:
  ratio_threshold: 1.6
  pipelines:
    single:
      - grayscale
      - illumination
      - gamma
      - local_contrast
      - hist_equalize
      - bilateral
      - sharpen
      - unsharp
      - threshold
      - morph
      - stroke_boost
      - denoise
      - crop_margin
      - pad
      - resize
    wide:
      - grayscale
      - illumination
      - gamma
      - clahe
      - local_contrast
      - hist_equalize
      - bilateral
      - sharpen
      - unsharp
      - threshold
      - morph
      - stroke_boost
      - deskew
      - crop_margin
      - resize
      - denoise
  operations:
    threshold:
      type: binary
      value: 128
      block_size: 35
      c: 11
    clahe:
      clip_limit: 1.0
      tile_grid_size: 2
    sharpen:
      enabled: true
      amount: 0.2
      sigma: 0.5
    gamma:
      enabled: false
      value: 1.0
    morph:
      enabled: false
      method: close
      ksize: 3
      iterations: 1
    unsharp:
      enabled: false
      amount: 0.8
      radius: 1.0
      threshold: 0
    bilateral:
      enabled: false
      diameter: 5
      sigma_color: 50
      sigma_space: 50
    local_contrast:
      enabled: false
      clip_limit: 2.0
      tile_grid_size: 8
    crop_margin:
      enabled: false
      threshold: 245
      margin: 2
      min_pixels: 10
    hist_equalize:
      enabled: false
    stroke_boost:
      enabled: true
      method: close
      ksize: 1
      iterations: 1
    denoise:
      method: gaussian
      ksize: 1
    pad:
      mode: square
      fill: 255
    resize:
      single: 64
      wide_height: 48
      keep_ratio: true
      interpolation: area
    deskew:
      enabled: true
      min_foreground_pixels: 20
      border_value: 255
    normalize:
      enabled: false
      mean: 0.5
      std: 0.5

dataset:
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  seed: 42

training:
  default_epochs: 30
  default_batch_size: 16
  default_lr: 0.001
  default_image_size: [64, 64]
  num_workers: 0
  image_type_to_model:
    single: square
    wide: wide
  default_model_type: square
  models:
    square:
      image_size: [64, 64]
    wide:
      image_size: [96, 48]

ocr_training:
  paddleocr_repo_dir: external/PaddleOCR
  default_device: auto
  default_auto_batch_size: false
  default_train_num_workers: 0
  default_eval_num_workers: 0
  default_save_epoch_step: 10
  default_use_amp: false
  default_pin_memory: false
  default_persistent_workers: false
  presets:
    mac_safe:
      device: cpu
      auto_batch_size: false
      train_num_workers: 0
      eval_num_workers: 0
      batch_size: 8
      save_epoch_step: 10
      use_amp: false
      pin_memory: false
      persistent_workers: false
    rtx_train:
      device: gpu
      auto_batch_size: true
      train_num_workers: 4
      eval_num_workers: 2
      batch_size: 24
      save_epoch_step: 5
      use_amp: true
      pin_memory: true
      persistent_workers: true

tesseract:
  # 学習/推論に使う実行ファイルの場所。空の場合は PATH から解決する
  tesseract_cmd: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"
  lstmtraining_cmd: "C:\\Program Files\\Tesseract-OCR\\lstmtraining.exe"
  combine_tessdata_cmd: "C:\\Program Files\\Tesseract-OCR\\combine_tessdata.exe"
  # ベース traineddata の格納フォルダ（tessdata_best 推奨）。空なら TESSDATA_PREFIX / models 配下を探索
  tessdata_dir: "C:/Users/shashimoto/project/workspace_codex/ocr_crafter/models/tessdata_best"
  # fine-tune のベース言語（英語筆記体の小文字学習は eng を使用）
  base_lang: eng
  # 学習対象文字セット（英大文字A-Z / 数字0-9 / 小文字筆記体 k,l,t）
  # ※whitelist（推論時の探索制約）は別概念。既定はこの値と同じだが独立に変更可
  default_charset: ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789klt
  # LSTM fine-tune の最大イテレーション数
  default_max_iterations: 1000
  # 単一行認識用の Page Segmentation Mode
  default_psm: 7
