app:
  name: ocr-crafter
  db_path: outputs/app.db

paths:
  data_projects: data/projects
  outputs: outputs

preprocess:
  ratio_threshold: 1.6
  pipelines:
    single:
      - grayscale
      - gamma
      - local_contrast
      - hist_equalize
      - bilateral
      - sharpen
      - unsharp
      - threshold
      - morph
      - stroke_boost
      - denoise
      - crop_margin
      - pad
      - resize
    wide:
      - grayscale
      - gamma
      - clahe
      - local_contrast
      - hist_equalize
      - bilateral
      - sharpen
      - unsharp
      - threshold
      - morph
      - stroke_boost
      - deskew
      - crop_margin
      - resize
      - denoise
  operations:
    threshold:
      type: binary
      value: 128
      block_size: 35
      c: 11
    clahe:
      clip_limit: 1.0
      tile_grid_size: 2
    sharpen:
      enabled: true
      amount: 0.2
      sigma: 0.5
    gamma:
      enabled: false
      value: 1.0
    morph:
      enabled: false
      method: close
      ksize: 3
      iterations: 1
    unsharp:
      enabled: false
      amount: 0.8
      radius: 1.0
      threshold: 0
    bilateral:
      enabled: false
      diameter: 5
      sigma_color: 50
      sigma_space: 50
    local_contrast:
      enabled: false
      clip_limit: 2.0
      tile_grid_size: 8
    crop_margin:
      enabled: false
      threshold: 245
      margin: 2
      min_pixels: 10
    hist_equalize:
      enabled: false
    stroke_boost:
      enabled: true
      method: close
      ksize: 1
      iterations: 1
    denoise:
      method: gaussian
      ksize: 1
    pad:
      mode: square
      fill: 255
    resize:
      single: 64
      wide_height: 48
      keep_ratio: true
      interpolation: area
    deskew:
      enabled: true
      min_foreground_pixels: 20
      border_value: 255
    normalize:
      enabled: false
      mean: 0.5
      std: 0.5

dataset:
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  seed: 42

training:
  default_epochs: 50
  default_batch_size: 16
  default_lr: 0.001
  default_image_size: [64, 64]
  num_workers: 0
  image_type_to_model:
    single: square
    wide: wide
  default_model_type: square
  models:
    square:
      image_size: [64, 64]
    wide:
      image_size: [96, 48]
