name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-dev.txt

      # 注意: requirements.txt はローカル全量スナップショット（GPU版paddle等の巨大依存を含む）のため、
      # CI では最小依存の requirements-ci.txt を使用する（torchはCPU版）。
      # 外部モデルのダウンロードは行わない。
      - name: Install dependencies (CI minimal)
        run: |
          pip install -r requirements-ci.txt
          pip install -r requirements-dev.txt

      - name: Backend import check
        run: python -c "import src.app.main; print('IMPORT OK')"

      # Tesseract本体・学習ツールが無いため、該当E2Eテストは自動skipされる
      - name: Run tests
        run: python -m pytest tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
